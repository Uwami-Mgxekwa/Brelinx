<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found — Brelinx</title>

  <link rel="icon" type="image/x-icon" href="./assets/logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./css/index.css">

  <style>
    .not-found-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 20px 60px;
      background: var(--bg-secondary);
    }
    .not-found-inner {
      max-width: 560px;
    }
    .not-found-code {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .not-found-icon {
      font-size: 3rem;
      color: var(--primary-color);
      margin-bottom: 20px;
      opacity: 0.7;
    }
    .not-found-inner h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
    }
    .not-found-inner p {
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .not-found-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .countdown {
      margin-top: 28px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .countdown span {
      color: var(--primary-color);
      font-weight: 700;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <nav class="navbar">
      <div class="container">
        <div class="nav-wrapper">
          <div class="logo">
            <a href="./index.html" class="logo-text">
              <span class="logo-brelin">brelin</span><span class="logo-x">x</span>
            </a>
          </div>
          <div class="nav-controls">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
              <i class="fas fa-moon"></i>
            </button>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <section class="not-found-section">
    <div class="not-found-inner">
      <div class="not-found-code">404</div>
      <div class="not-found-icon"><i class="fas fa-map-signs"></i></div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
      <div class="not-found-buttons">
        <a href="./index.html" class="btn btn-primary">
          <i class="fas fa-home"></i> Back to Home
        </a>
        <a href="./coaching.html" class="btn btn-secondary">
          <i class="fas fa-graduation-cap"></i> Student Coaching
        </a>
      </div>
      <div class="countdown">Redirecting to home in <span id="timer">10</span> seconds…</div>
    </div>
  </section>

  <script src="./js/index.js"></script>
  <script>
    let seconds = 10;
    const timerEl = document.getElementById('timer');
    const interval = setInterval(() => {
      seconds--;
      timerEl.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = './index.html';
      }
    }, 1000);
  </script>
</body>
</html>
